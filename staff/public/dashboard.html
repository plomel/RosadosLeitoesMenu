<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — Rosa dos Leitões Staff</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-brand">
    <img src="/assets/logo.svg" alt="" onerror="this.style.display='none'">
    Rosa dos Leitões
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-user">
    <span id="topbar-name"></span>
    <span class="role-badge" id="topbar-role"></span>
    <button class="btn-logout" id="btn-logout">Sair</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar"><div id="sidebar-nav"></div></nav>
  <main class="main">

    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-subtitle" id="hoje-label"></div>
      </div>
    </div>

    <!-- Stats do dia -->
    <div class="stats" id="stats-dia">
      <div class="stat"><div class="stat-val" id="st-enc">—</div><div class="stat-label">Encomendas hoje</div></div>
      <div class="stat"><div class="stat-val" id="st-prox">—</div><div class="stat-label">Próximos 7 dias</div></div>
      <div class="stat"><div class="stat-val" id="st-pax">—</div><div class="stat-label">Pax hoje</div></div>
      <div class="stat"><div class="stat-val" id="st-doses">—</div><div class="stat-label">Doses leitão hoje</div></div>
      <a href="/compras.html" class="stat" style="text-decoration:none">
        <div class="stat-val" id="st-compras">—</div>
        <div class="stat-label" id="st-compras-label">A comprar</div>
      </a>
    </div>

    <!-- Calendário mini -->
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-title" style="margin-bottom:0">📅 Calendário</div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-outline btn-sm" id="cal-prev">◀</button>
          <span id="cal-label" style="font-size:14px;font-weight:600;min-width:130px;text-align:center"></span>
          <button class="btn btn-outline btn-sm" id="cal-next">▶</button>
        </div>
      </div>
      <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center"></div>
    </div>

    <!-- Widget compras urgentes -->
    <div class="card" id="card-compras" style="margin-bottom:16px;display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="card-title" style="margin-bottom:0;color:var(--danger)">🔴 Compras Urgentes</div>
        <a href="/compras.html" style="font-size:12px;color:var(--gold)">Ver tudo →</a>
      </div>
      <div id="list-urgentes" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>

    <!-- Próximas encomendas -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">📋 Próximas Encomendas (14 dias)</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Data</th><th>Dia</th><th>Hora</th><th>Nome</th><th>Mesa/Tipo</th><th>Pax</th><th>Leitão</th><th>Obs</th>
            </tr>
          </thead>
          <tbody id="tbl-proximas">
            <tr><td colspan="8" style="text-align:center;color:var(--muted);padding:20px">A carregar...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="/assets/api.js"></script>
<script>
Auth.requireLogin();
renderTopbar();
renderSidebar();

const hoje = todayISO();
document.getElementById('hoje-label').textContent =
  `${diaSemana(hoje)}, ${formatDate(hoje)}`;

async function loadDashboard() {
  try {
    // Encomendas de hoje
    const encHoje = await apiFetch(`/encomendas?data=${hoje}`);
    document.getElementById('st-enc').textContent = encHoje.length;

    // Próximas
    const proximas = await apiFetch('/encomendas/proximas');
    const em7 = proximas.filter(e => e.data > hoje && e.data <= new Date(Date.now()+7*86400000).toISOString().slice(0,10));
    document.getElementById('st-prox').textContent = em7.length;

    // Pax e doses hoje
    const pax = encHoje.reduce((s,e) => s + (e.pax||0), 0);
    const doses = encHoje.reduce((s,e) => s + (e.leitao_1||0) + (e.leitao_meio||0)*0.5 + (e.leitao_quarto||0)*0.25, 0);
    document.getElementById('st-pax').textContent = pax || '—';
    document.getElementById('st-doses').textContent = doses ? doses.toFixed(2) : '—';

    // Tabela próximas
    const tbody = document.getElementById('tbl-proximas');
    if (!proximas.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:20px">Sem encomendas nos próximos 14 dias</td></tr>';
      return;
    }
    tbody.innerHTML = proximas.map(e => {
      const leitao = [
        e.leitao_1 ? `${e.leitao_1}×1` : '',
        e.leitao_meio ? `${e.leitao_meio}×½` : '',
        e.leitao_quarto ? `${e.leitao_quarto}×¼` : ''
      ].filter(Boolean).join(' ');
      const tipo = e.tipo === 'entrega' ? '<span class="badge badge-blue">Entrega</span>' : '<span class="badge badge-gold">Mesa ' + (e.mesa||'—') + '</span>';
      const isHoje = e.data === hoje;
      return `<tr style="${isHoje ? 'background:rgba(201,150,42,.06)' : ''}">
        <td>${formatDate(e.data)}</td>
        <td>${e.dia_semana || diaSemana(e.data)}</td>
        <td>${e.hora||'—'}</td>
        <td><strong>${e.nome}</strong>${e.contacto ? `<br><small style="color:var(--muted)">${e.contacto}</small>` : ''}</td>
        <td>${tipo}</td>
        <td>${e.pax||'—'}</td>
        <td>${leitao||'—'}</td>
        <td style="font-size:12px;color:var(--muted)">${e.obs||''}</td>
      </tr>`;
    }).join('');
  } catch(err) {
    console.error(err);
  }
}

loadDashboard();
loadCompras();

async function loadCompras() {
  try {
    const resumo = await apiFetch('/compras/resumo');
    const stVal = document.getElementById('st-compras');
    const stLabel = document.getElementById('st-compras-label');
    stVal.textContent = resumo.total || '—';
    if (resumo.urgentes > 0) {
      stVal.style.color = 'var(--danger)';
      stLabel.textContent = `A comprar (${resumo.urgentes} urgente${resumo.urgentes > 1 ? 's' : ''})`;
    }
    // Widget urgentes
    if (resumo.urgentes > 0) {
      const urgentes = await apiFetch('/compras?estado=pendente');
      const urg = urgentes.filter(i => i.urgencia === 'urgente');
      if (urg.length) {
        document.getElementById('card-compras').style.display = 'block';
        document.getElementById('list-urgentes').innerHTML = urg.map(i =>
          `<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;
                       background:rgba(192,57,43,.07);border:1px solid rgba(192,57,43,.2);
                       border-radius:var(--radius)">
            <span style="font-size:14px;font-weight:600;flex:1">${i.item}</span>
            ${i.quantidade ? `<span style="font-size:12px;color:var(--gold)">${i.quantidade}</span>` : ''}
            <span style="font-size:11px;color:var(--muted)">${i.created_by_name||''}</span>
          </div>`
        ).join('');
      }
    }
  } catch(e) { /* silencioso */ }
}

// ─── Calendário ────────────────────────────────────────────────────────────
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
               'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS_ABREV = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

let calAno = new Date().getFullYear();
let calMes = new Date().getMonth() + 1;

async function renderCal() {
  document.getElementById('cal-label').textContent = `${MESES[calMes-1]} ${calAno}`;
  const dados = await apiFetch(`/encomendas/mes?ano=${calAno}&mes=${calMes}`).catch(() => []);
  const mapa = {};
  dados.forEach(d => { mapa[d.data] = d; });

  const grid = document.getElementById('cal-grid');
  let html = DIAS_ABREV.map(d => `<div style="font-size:10px;color:var(--muted);font-weight:600;padding:3px 0">${d}</div>`).join('');

  const primeiro = new Date(calAno, calMes-1, 1).getDay();
  for (let i=0; i<primeiro; i++) html += '<div></div>';

  const diasNoMes = new Date(calAno, calMes, 0).getDate();
  const hojeStr = todayISO();

  for (let d=1; d<=diasNoMes; d++) {
    const iso = `${calAno}-${String(calMes).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const info = mapa[iso];
    const isHoje = iso === hojeStr;
    const hasEnc = !!info;
    let bg = isHoje ? 'rgba(201,150,42,.25)' : hasEnc ? 'rgba(201,150,42,.08)' : 'transparent';
    let border = isHoje ? '1px solid var(--gold)' : hasEnc ? '1px solid rgba(201,150,42,.3)' : '1px solid transparent';
    const dot = hasEnc ? `<div style="font-size:9px;color:var(--gold)">${info.total}enc</div>` : '';
    html += `<div onclick="window.location='/encomendas.html?data=${iso}'"
      style="background:${bg};border:${border};border-radius:6px;padding:4px 2px;cursor:${hasEnc||isHoje?'pointer':'default'};min-height:36px">
      <div style="font-size:13px;font-weight:${isHoje?'700':'400'};color:${isHoje?'var(--gold)':'var(--text)'}">${d}</div>
      ${dot}
    </div>`;
  }
  grid.innerHTML = html;
}

document.getElementById('cal-prev').onclick = () => {
  calMes--; if (calMes < 1) { calMes = 12; calAno--; } renderCal();
};
document.getElementById('cal-next').onclick = () => {
  calMes++; if (calMes > 12) { calMes = 1; calAno++; } renderCal();
};

renderCal();
</script>
</body>
</html>
