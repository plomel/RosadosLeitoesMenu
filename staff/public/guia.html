<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guia Staff — Rosa dos Leitões</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .seccao-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .tab-btn {
      padding: 7px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: none; color: var(--muted);
      transition: all .15s;
    }
    .tab-btn.active { background: var(--gold); color: #1a1000; border-color: var(--gold); }
    .tab-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

    .artigo {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    }
    .artigo-titulo { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .artigo-conteudo { font-size: 14px; line-height: 1.7; color: var(--muted); white-space: pre-wrap; }

    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 12px; }
    .video-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .video-embed { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
    .video-embed iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .video-info { padding: 10px 12px; }
    .video-titulo { font-size: 13px; font-weight: 600; }
    .video-desc { font-size: 12px; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <img src="/assets/logo.svg" alt="" onerror="this.style.display='none'">
    Rosa dos Leitões
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-user">
    <span id="topbar-name"></span>
    <span class="role-badge" id="topbar-role"></span>
    <button class="btn-logout" id="btn-logout">Sair</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar"><div id="sidebar-nav"></div></nav>
  <main class="main">

    <div class="page-header">
      <div>
        <div class="page-title">📖 Guia da Staff</div>
        <div class="page-subtitle">Procedimentos, regras e vídeos de formação</div>
      </div>
      <div id="admin-actions" style="display:none">
        <button class="btn btn-primary btn-sm" id="btn-add-artigo">+ Artigo</button>
        <button class="btn btn-outline btn-sm" id="btn-add-video">+ Vídeo</button>
      </div>
    </div>

    <!-- Tabs de secção -->
    <div class="seccao-tabs" id="seccao-tabs"></div>

    <!-- Conteúdo -->
    <div id="conteudo-area"></div>

    <!-- Vídeos -->
    <div id="videos-area"></div>

  </main>
</div>

<!-- Modal artigo -->
<div class="modal-overlay" id="modal-artigo">
  <div class="modal">
    <div class="modal-title" id="modal-artigo-title">Novo Artigo</div>
    <div id="alert-artigo" class="alert alert-error" style="display:none"></div>
    <input type="hidden" id="artigo-id">
    <div class="form-group">
      <label>Secção</label>
      <select id="artigo-seccao">
        <option value="geral">Geral</option>
        <option value="cozinha">Cozinha</option>
        <option value="sala">Sala</option>
        <option value="limpeza">Limpeza</option>
      </select>
    </div>
    <div class="form-group">
      <label>Título *</label>
      <input type="text" id="artigo-titulo" placeholder="Título do artigo">
    </div>
    <div class="form-group">
      <label>Conteúdo</label>
      <textarea id="artigo-conteudo" rows="6" placeholder="Procedimentos, regras, informações..."></textarea>
    </div>
    <div class="form-group">
      <label>Ordem</label>
      <input type="number" id="artigo-ordem" min="0" value="0">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeArtigoModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-artigo">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal vídeo -->
<div class="modal-overlay" id="modal-video">
  <div class="modal">
    <div class="modal-title">Adicionar Vídeo</div>
    <div id="alert-video" class="alert alert-error" style="display:none"></div>
    <div class="form-group">
      <label>Secção</label>
      <select id="video-seccao">
        <option value="geral">Geral</option>
        <option value="cozinha">Cozinha</option>
        <option value="sala">Sala</option>
        <option value="limpeza">Limpeza</option>
      </select>
    </div>
    <div class="form-group">
      <label>Título *</label>
      <input type="text" id="video-titulo" placeholder="Nome do vídeo">
    </div>
    <div class="form-group">
      <label>URL do YouTube *</label>
      <input type="url" id="video-url" placeholder="https://www.youtube.com/watch?v=...">
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <textarea id="video-desc" rows="2"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeVideoModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-video">Guardar</button>
    </div>
  </div>
</div>

<script src="/assets/api.js"></script>
<script>
Auth.requireLogin();
renderTopbar();
renderSidebar();

const user = Auth.getUser();
const isAdmin = user && user.role === 'admin';
if (isAdmin) document.getElementById('admin-actions').style.display = 'flex';

const SECCOES_LABEL = { geral:'🌐 Geral', cozinha:'👨‍🍳 Cozinha', sala:'🍽️ Sala', limpeza:'🧹 Limpeza' };
let allArtigos = [], allVideos = [], currentSeccao = 'geral';

async function loadGuia() {
  [allArtigos, allVideos] = await Promise.all([
    apiFetch('/guia'),
    apiFetch('/guia/videos')
  ]);
  buildTabs();
  renderConteudo();
}

function buildTabs() {
  const seccoes = [...new Set(allArtigos.map(a => a.seccao).concat(allVideos.map(v => v.seccao)))];
  const tabs = document.getElementById('seccao-tabs');
  tabs.innerHTML = seccoes.map(s => `
    <button class="tab-btn ${s===currentSeccao?'active':''}" onclick="setSeccao('${s}')">${SECCOES_LABEL[s]||s}</button>
  `).join('');
}

function setSeccao(s) {
  currentSeccao = s;
  buildTabs();
  renderConteudo();
}

function renderConteudo() {
  const artigos = allArtigos.filter(a => a.seccao === currentSeccao);
  const videos  = allVideos.filter(v => v.seccao === currentSeccao);

  const area = document.getElementById('conteudo-area');
  if (!artigos.length) {
    area.innerHTML = '<p style="color:var(--muted);font-size:13px;margin-bottom:16px">Sem artigos nesta secção.</p>';
  } else {
    area.innerHTML = artigos.map(a => `
      <div class="artigo">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="artigo-titulo">${a.titulo}</div>
          ${isAdmin ? `<div style="display:flex;gap:4px">
            <button class="btn-icon" onclick="editArtigo(${a.id})">✏️</button>
            <button class="btn-icon" onclick="deleteArtigo(${a.id})" style="color:var(--danger)">🗑</button>
          </div>` : ''}
        </div>
        <div class="artigo-conteudo">${a.conteudo||''}</div>
      </div>
    `).join('');
  }

  const varea = document.getElementById('videos-area');
  if (!videos.length) {
    varea.innerHTML = '';
    return;
  }
  varea.innerHTML = `
    <div style="margin-top:16px">
      <div class="card-title">🎬 Vídeos de Formação</div>
      <div class="video-grid">
        ${videos.map(v => {
          const vid = getYoutubeId(v.youtube_url);
          return `<div class="video-card">
            <div class="video-embed">
              <iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen loading="lazy"></iframe>
            </div>
            <div class="video-info">
              <div class="video-titulo">${v.titulo}</div>
              ${v.descricao ? `<div class="video-desc">${v.descricao}</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function getYoutubeId(url) {
  const m = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : url;
}

// Modal artigo
function openArtigoModal(a = null) {
  document.getElementById('modal-artigo').classList.add('open');
  document.getElementById('alert-artigo').style.display = 'none';
  if (a) {
    document.getElementById('modal-artigo-title').textContent = 'Editar Artigo';
    document.getElementById('artigo-id').value      = a.id;
    document.getElementById('artigo-seccao').value  = a.seccao;
    document.getElementById('artigo-titulo').value  = a.titulo;
    document.getElementById('artigo-conteudo').value= a.conteudo||'';
    document.getElementById('artigo-ordem').value   = a.ordem||0;
  } else {
    document.getElementById('modal-artigo-title').textContent = 'Novo Artigo';
    document.getElementById('artigo-id').value = '';
    document.getElementById('artigo-seccao').value  = currentSeccao;
    document.getElementById('artigo-titulo').value  = '';
    document.getElementById('artigo-conteudo').value= '';
    document.getElementById('artigo-ordem').value   = 0;
  }
}
function closeArtigoModal() { document.getElementById('modal-artigo').classList.remove('open'); }
document.getElementById('modal-artigo').addEventListener('click', e => { if(e.target===e.currentTarget) closeArtigoModal(); });

document.getElementById('btn-add-artigo').onclick = () => openArtigoModal();
function editArtigo(id) { openArtigoModal(allArtigos.find(a=>a.id===id)); }

document.getElementById('btn-save-artigo').onclick = async () => {
  const titulo = document.getElementById('artigo-titulo').value.trim();
  if (!titulo) return showAlert(document.getElementById('alert-artigo'), 'Título obrigatório');
  const id = document.getElementById('artigo-id').value;
  const body = {
    seccao:   document.getElementById('artigo-seccao').value,
    titulo,
    conteudo: document.getElementById('artigo-conteudo').value,
    ordem:    parseInt(document.getElementById('artigo-ordem').value)||0
  };
  try {
    if (id) await apiFetch(`/guia/${id}`, { method: 'PUT', body });
    else    await apiFetch('/guia',        { method: 'POST', body });
    closeArtigoModal(); loadGuia();
  } catch(err) { showAlert(document.getElementById('alert-artigo'), err.message); }
};

async function deleteArtigo(id) {
  if (!confirm('Apagar este artigo?')) return;
  await apiFetch(`/guia/${id}`, { method: 'DELETE' });
  loadGuia();
}

// Modal vídeo
function openVideoModal() { document.getElementById('modal-video').classList.add('open'); }
function closeVideoModal() { document.getElementById('modal-video').classList.remove('open'); }
document.getElementById('modal-video').addEventListener('click', e => { if(e.target===e.currentTarget) closeVideoModal(); });
document.getElementById('btn-add-video').onclick = openVideoModal;

document.getElementById('btn-save-video').onclick = async () => {
  const titulo = document.getElementById('video-titulo').value.trim();
  const url    = document.getElementById('video-url').value.trim();
  if (!titulo || !url) return showAlert(document.getElementById('alert-video'), 'Título e URL obrigatórios');
  const body = {
    seccao:      document.getElementById('video-seccao').value,
    titulo, youtube_url: url,
    descricao:   document.getElementById('video-desc').value,
    ordem: 0
  };
  try {
    await apiFetch('/guia/videos', { method: 'POST', body });
    closeVideoModal(); loadGuia();
  } catch(err) { showAlert(document.getElementById('alert-video'), err.message); }
};

loadGuia();
</script>
</body>
</html>
